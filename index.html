
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestãoFisio - Gestão de Clínica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
<script>
  (function() {
    try {
      const stored = localStorage.getItem('fisiopro_clinic_settings');
      let clinicName = 'Sistema';
      let logoUrl = '';
      if (stored) {
        const parsed = JSON.parse(stored);
        if (parsed.value && typeof parsed.value === 'string') {
          const inner = JSON.parse(parsed.value);
          clinicName = inner.clinic_name || 'Sistema';
          logoUrl = inner.logo_url || '';
        } else {
          clinicName = parsed.clinic_name || 'Sistema';
          logoUrl = parsed.logo_url || '';
        }
      }
      
      const manifest = {
        name: clinicName,
        short_name: clinicName,
        start_url: "/",
        display: "standalone",
        background_color: "#ffffff",
        theme_color: "#0891b2",
        icons: []
      };
      
      if (logoUrl) {
        manifest.icons.push({ src: logoUrl, sizes: "192x192", type: "image/png", purpose: "any" });
        manifest.icons.push({ src: logoUrl, sizes: "512x512", type: "image/png", purpose: "any" });
      } else {
        manifest.icons.push({ src: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==", sizes: "192x192", type: "image/png" });
      }
      
      const stringManifest = JSON.stringify(manifest);
      const blob = new Blob([stringManifest], { type: 'application/json' });
      const manifestURL = URL.createObjectURL(blob);
      
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.id = 'dynamic-manifest';
      link.href = manifestURL;
      document.head.appendChild(link);
      
      if (logoUrl) {
        let fav = document.querySelector("link[rel~='icon']");
        if (!fav) {
          fav = document.createElement('link');
          fav.rel = 'icon';
          document.head.appendChild(fav);
        }
        fav.href = logoUrl;
      }
      
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.log('SW registration failed: ', err);
          });
        });
      }
      
      // Store the install prompt event globally so the app can use it later
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent Chrome from showing the mini-infobar automatically
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
      });
      
    } catch(e) {
      console.error('Error generating dynamic manifest', e);
    }
  })();
</script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
